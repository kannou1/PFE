name: CD - Update GitOps Manifests

on:
  workflow_run:
    workflows:
      - CI - Test, Build, Push Images
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: update-gitops-main
  cancel-in-progress: false

jobs:
  update-gitops:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: ubuntu-latest

    env:
      GITOPS_REPOSITORY: dhouhaka/gitops-repo
      IMAGE_OWNER: dhouhaka

    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          token: ${{ secrets.GITOPS_TOKEN }}
          ref: main

      - name: Update Kubernetes image tags
        shell: bash
        run: |
          set -euo pipefail

          SHA="${{ github.event.workflow_run.head_sha }}"

          echo "Updating GitOps manifests with commit: ${SHA}"

          sed -i -E \
            "s#^([[:space:]]*image:[[:space:]]*)ghcr.io/[^/]+/pfe-backend:.*#\1ghcr.io/${IMAGE_OWNER}/pfe-backend:${SHA}#" \
            k8s/backend/deployment.yaml

          sed -i -E \
            "s#^([[:space:]]*image:[[:space:]]*)ghcr.io/[^/]+/pfe-frontend:.*#\1ghcr.io/${IMAGE_OWNER}/pfe-frontend:${SHA}#" \
            k8s/frontend/deployment.yaml

          sed -i -E \
            "s#^([[:space:]]*image:[[:space:]]*)ghcr.io/[^/]+/pfe-ai-service:.*#\1ghcr.io/${IMAGE_OWNER}/pfe-ai-service:${SHA}#" \
            k8s/ai-service/deployment.yaml

          echo "Updated images:"

          grep -R \
            "image: ghcr.io/${IMAGE_OWNER}/pfe-" \
            k8s/*/deployment.yaml

      - name: Commit and push manifest changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            k8s/backend/deployment.yaml \
            k8s/frontend/deployment.yaml \
            k8s/ai-service/deployment.yaml

          if git diff --cached --quiet; then
            echo "No manifest changes detected."
            exit 0
          fi

          git commit -m "chore: deploy ${{ github.event.workflow_run.head_sha }}"
          git push origin main